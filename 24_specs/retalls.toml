# retalls.toml — Definicions de retalls (crops) SVG per al projecte EC.
#
# Aquest fitxer és la font de veritat per als retalls generats per
# 25_scripts/gen_crops.py. Encara no hi ha cap retall definit; el fitxer
# es manté buit (però present) perquè el pipeline de pre-render el pugui
# referenciar sense error.
#
# Format de cada retall:
#
#   [crops.nom_fitxer_sortida_sense_extensio]
#   source = "nom_fitxer_font_sense_extensio__original_light"  # ha d'existir a auto_figs/
#   title  = "Descripció del detall (opcional)"
#   x = 54    # min-x del retall, en coordenades del viewBox de la font
#   y = 60    # min-y
#   w = 300   # amplada
#   h = 250   # alçada
#
# Condició d'aplicabilitat (vegeu 13_contrib.qmd §Retalls): el retall només
# és vàlid si és un subconjunt net del viewBox de la figura font — cap
# element ha de quedar tallat a mig camí (connectors, fletxes o etiquetes
# "penjant" sense l'element que assenyalaven).
#
# Vegeu 25_scripts/gen_crops.py per als detalls tècnics.
