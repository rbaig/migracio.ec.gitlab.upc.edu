  <line x1="240" y1="160" x2="244" y2="160" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="240" y1="170" x2="244" y2="170" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="240" y1="180" x2="244" y2="180" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="240" y1="190" x2="244" y2="190" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="296" y1="110" x2="300" y2="110" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="296" y1="120" x2="300" y2="120" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="296" y1="130" x2="300" y2="130" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="296" y1="140" x2="300" y2="140" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="296" y1="150" x2="300" y2="150" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="296" y1="160" x2="300" y2="160" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="296" y1="170" x2="300" y2="170" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="296" y1="180" x2="300" y2="180" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="296" y1="190" x2="300" y2="190" stroke="#6c757d" stroke-width="0.75"/>

  <!-- sp → apunta a y=200 -->
  <text x="235" y="203" text-anchor="end"
        font-family="'Liberation Mono', 'Courier New', Courier, monospace"
        font-size="10" font-weight="bold" fill="#664d03">sp →</text>

</svg>
