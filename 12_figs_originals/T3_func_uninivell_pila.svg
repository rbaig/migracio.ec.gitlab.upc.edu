  <line x1="116" y1="150" x2="120" y2="150" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="116" y1="160" x2="120" y2="160" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="116" y1="170" x2="120" y2="170" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="116" y1="180" x2="120" y2="180" stroke="#6c757d" stroke-width="0.75"/>
  <line x1="116" y1="190" x2="120" y2="190" stroke="#6c757d" stroke-width="0.75"/>

