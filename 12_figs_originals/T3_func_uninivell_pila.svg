<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="310"
   height="240"
   viewBox="0 0 310 240"
   font-family="'Liberation Sans', Arial, Helvetica, sans-serif"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs/>

  <!-- ===== CODI C (y=10..50) ===== -->
  <text x="60" y="26"
        font-family="'Liberation Mono', 'Courier New', Courier, monospace"
        font-size="11" fill="#343a40">void funcB() &#123; sentB; &#125;</text>

  <!-- Línia separadora codi / etiquetes columna -->
  <line x1="60" y1="50" x2="300" y2="50" stroke="#adb5bd" stroke-width="0.5"/>

  <!-- ===== ETIQUETES DE COLUMNA (y=50..100) ===== -->
