<svg width="680" height="220" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Tecnologies de memòria: capacitat, temps d'accés i cost (mode clar)</title>
<desc>Taula comparativa de les principals tecnologies d'emmagatzematge: registres, SRAM (memòria cau), DRAM (memòria principal), SSD i disc dur, amb valors típics de capacitat, temps d'accés i cost per GB.</desc>

<!-- Columnes: x=20 etiq(185) | x=205 cap(130) | x=335 accés(150) | x=485 cost(150) | fi=635 -->
<!-- Files alçada=30: y=20 cap | y=50 r0 | y=80 r1 | y=110 r2 | y=140 r3 | y=170 r4 -->

<!-- Capçalera (gris neutre) -->
<rect x="20"  y="20" width="185" height="30" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.5"/>
<rect x="205" y="20" width="130" height="30" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.5"/>
<rect x="335" y="20" width="150" height="30" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.5"/>
<rect x="485" y="20" width="150" height="30" rx="3" fill="#f8f9fa" stroke="#adb5bd" stroke-width="0.5"/>
<text x="112" y="40" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#343a40" text-anchor="middle" font-weight="bold">Tecnologia</text>
<text x="270" y="40" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#343a40" text-anchor="middle" font-weight="bold">Capacitat típica</text>
<text x="410" y="40" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#343a40" text-anchor="middle" font-weight="bold">Temps d'accés</text>
<text x="560" y="40" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#343a40" text-anchor="middle" font-weight="bold">Cost per GB</text>

<!-- Fila 0: Registres (neutre amb contorn fosc) -->
<rect x="20"  y="50" width="185" height="30" rx="3" fill="#f8f9fa" stroke="#343a40" stroke-width="1"/>
<rect x="205" y="50" width="130" height="30" rx="3" fill="#f8f9fa" stroke="#343a40" stroke-width="1"/>
<rect x="335" y="50" width="150" height="30" rx="3" fill="#f8f9fa" stroke="#343a40" stroke-width="1"/>
<rect x="485" y="50" width="150" height="30" rx="3" fill="#f8f9fa" stroke="#343a40" stroke-width="1"/>
<text x="112" y="70" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#343a40" text-anchor="middle">Registres (SRAM)</text>
<text x="270" y="70" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#343a40" text-anchor="middle">~1 KB</text>
<text x="410" y="70" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#343a40" text-anchor="middle">~0,25 ns</text>
<text x="560" y="70" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#343a40" text-anchor="middle">—</text>

<!-- Fila 1: Memòria cau (blau) -->
<rect x="20"  y="80" width="185" height="30" rx="3" fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
<rect x="205" y="80" width="130" height="30" rx="3" fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
<rect x="335" y="80" width="150" height="30" rx="3" fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
<rect x="485" y="80" width="150" height="30" rx="3" fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
<text x="112" y="100" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#084298" text-anchor="middle">Memòria cau (SRAM)</text>
<text x="270" y="100" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#084298" text-anchor="middle">32 KB – 64 MB</text>
<text x="410" y="100" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#084298" text-anchor="middle">0,5 – 5 ns</text>
<text x="560" y="100" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#084298" text-anchor="middle">~3.000 $/GB</text>

<!-- Fila 2: Memòria principal (verd) -->
<rect x="20"  y="110" width="185" height="30" rx="3" fill="#d1e7dd" stroke="#0a3622" stroke-width="1"/>
<rect x="205" y="110" width="130" height="30" rx="3" fill="#d1e7dd" stroke="#0a3622" stroke-width="1"/>
<rect x="335" y="110" width="150" height="30" rx="3" fill="#d1e7dd" stroke="#0a3622" stroke-width="1"/>
<rect x="485" y="110" width="150" height="30" rx="3" fill="#d1e7dd" stroke="#0a3622" stroke-width="1"/>
<text x="112" y="130" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#0a3622" text-anchor="middle">Mem. principal (DRAM)</text>
<text x="270" y="130" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#0a3622" text-anchor="middle">8 – 128 GB</text>
<text x="410" y="130" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#0a3622" text-anchor="middle">50 – 100 ns</text>
<text x="560" y="130" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#0a3622" text-anchor="middle">~3 $/GB</text>

<!-- Fila 3: SSD (groc) -->
<rect x="20"  y="140" width="185" height="30" rx="3" fill="#fff3cd" stroke="#664d03" stroke-width="1"/>
<rect x="205" y="140" width="130" height="30" rx="3" fill="#fff3cd" stroke="#664d03" stroke-width="1"/>
<rect x="335" y="140" width="150" height="30" rx="3" fill="#fff3cd" stroke="#664d03" stroke-width="1"/>
<rect x="485" y="140" width="150" height="30" rx="3" fill="#fff3cd" stroke="#664d03" stroke-width="1"/>
<text x="112" y="160" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#664d03" text-anchor="middle">Mem. secundària (SSD)</text>
<text x="270" y="160" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#664d03" text-anchor="middle">256 GB – 8 TB</text>
<text x="410" y="160" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#664d03" text-anchor="middle">0,05 – 0,1 ms</text>
<text x="560" y="160" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#664d03" text-anchor="middle">~0,08 $/GB</text>

<!-- Fila 4: Disc (vermell) -->
<rect x="20"  y="170" width="185" height="30" rx="3" fill="#f8d7da" stroke="#842029" stroke-width="1"/>
<rect x="205" y="170" width="130" height="30" rx="3" fill="#f8d7da" stroke="#842029" stroke-width="1"/>
<rect x="335" y="170" width="150" height="30" rx="3" fill="#f8d7da" stroke="#842029" stroke-width="1"/>
<rect x="485" y="170" width="150" height="30" rx="3" fill="#f8d7da" stroke="#842029" stroke-width="1"/>
<text x="112" y="190" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#842029" text-anchor="middle">Mem. secundària (disc)</text>
<text x="270" y="190" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#842029" text-anchor="middle">1 – 20 TB</text>
<text x="410" y="190" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#842029" text-anchor="middle">5 – 10 ms</text>
<text x="560" y="190" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#842029" text-anchor="middle">~0,02 $/GB</text>

</svg>
