<svg width="100%" viewBox="0 0 620 270" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Esquema dels bits de guarda, arrodoniment i sticky (GRS)</title>
<desc>Mantissa retinguda seguida dels tres bits descartats G, R i S que determinen l'arrodoniment.</desc>
<rect x="20" y="60" width="36" height="40" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
<text x="38.0" y="80.0" font-family="'Liberation Mono', 'Courier New', Courier, monospace" font-size="14" fill="#6c757d" text-anchor="middle" dominant-baseline="central">…</text>
<rect x="56" y="60" width="36" height="40" fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
<text x="74.0" y="80.0" font-family="'Liberation Mono', 'Courier New', Courier, monospace" font-size="14" fill="#084298" text-anchor="middle" dominant-baseline="central">1</text>
<rect x="92" y="60" width="36" height="40" fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
<text x="110.0" y="80.0" font-family="'Liberation Mono', 'Courier New', Courier, monospace" font-size="14" fill="#084298" text-anchor="middle" dominant-baseline="central">0</text>
<rect x="128" y="60" width="36" height="40" fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
<text x="146.0" y="80.0" font-family="'Liberation Mono', 'Courier New', Courier, monospace" font-size="14" fill="#084298" text-anchor="middle" dominant-baseline="central">1</text>
<rect x="164" y="60" width="36" height="40" fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
<text x="182.0" y="80.0" font-family="'Liberation Mono', 'Courier New', Courier, monospace" font-size="14" fill="#084298" text-anchor="middle" dominant-baseline="central">1</text>
<line x1="200" y1="50" x2="200" y2="110" stroke="#000000" stroke-width="1.5" stroke-dasharray="4,3"/>
<rect x="200" y="60" width="40" height="40" fill="#fff3cd" stroke="#664d03" stroke-width="1"/>
<text x="220.0" y="80.0" font-family="'Liberation Mono', 'Courier New', Courier, monospace" font-size="14" fill="#664d03" text-anchor="middle" dominant-baseline="central">1</text>
<text x="220.0" y="44" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#664d03" text-anchor="middle">G</text>
<rect x="240" y="60" width="40" height="40" fill="#f8d7da" stroke="#842029" stroke-width="1"/>
<text x="260.0" y="80.0" font-family="'Liberation Mono', 'Courier New', Courier, monospace" font-size="14" fill="#842029" text-anchor="middle" dominant-baseline="central">0</text>
<text x="260.0" y="44" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#842029" text-anchor="middle">R</text>
<rect x="280" y="60" width="40" height="40" fill="#d1e7dd" stroke="#0a3622" stroke-width="1"/>
<text x="300.0" y="80.0" font-family="'Liberation Mono', 'Courier New', Courier, monospace" font-size="14" fill="#0a3622" text-anchor="middle" dominant-baseline="central">1</text>
<text x="300.0" y="44" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#0a3622" text-anchor="middle">S</text>
<line x1="20" y1="28" x2="196" y2="28" stroke="#000000" stroke-width="1"/>
<text x="110.0" y="20" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#000000" text-anchor="middle">mantissa retinguda (p bits)</text>
<line x1="204" y1="28" x2="320" y2="28" stroke="#000000" stroke-width="1"/>
<text x="260.0" y="20" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#000000" text-anchor="middle">bits descartats</text>
<text x="200" y="126" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#664d03" text-anchor="start"><tspan font-weight="bold">G</tspan> (Guard) — primer bit descartat</text>
<text x="200" y="144" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#842029" text-anchor="start"><tspan font-weight="bold">R</tspan> (Round) — segon bit descartat</text>
<text x="200" y="162" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#0a3622" text-anchor="start"><tspan font-weight="bold">S</tspan> (Sticky) — OR lògic de la resta de bits descartats</text>
<text x="20" y="186" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#000000" text-anchor="start">Regla RNE:</text>
<text x="20" y="206" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#000000" text-anchor="start">G = 0 → trunca (queda la mantissa retinguda)</text>
<text x="20" y="224" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#000000" text-anchor="start">G = 1, R o S = 1 → arrodoneix al següent (+1 al bit de menys pes)</text>
<text x="20" y="242" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#000000" text-anchor="start">G = 1, R = S = 0 → empat: arrodoneix al parell</text>
</svg>