# reg_specs.toml — Definicions dels registres de bits per al projecte EC.
#
# Aquest fitxer és la font de veritat per a les figures de registres.
# Els contribuïdors poden afegir o modificar registres aquí sense tocar
# l'script generador (22_scripts/gen_bitfield.py).
#
# Format de cada registre:
#
#   [registers.nom_fitxer_sense_extensio]
#   title = "Títol llegible (apareix a <title> del SVG i al preview)"
#   desc  = "Descripció completa (pot incloure noms complets d'abreviatures)"
#
#   [[registers.nom_fitxer_sense_extensio.rows]]
#   bit_msb = 31          # número del bit MSB d'aquesta fila
#   fields  = [           # ordre MSB → LSB
#     ["NOM", n_bits, "COLOR"],
#     ...
#   ]
#
# Claus de color (COLOR):
#   "R"  Reservat / WPRI    gris    fill=#f8f9fa  stroke=#adb5bd
#   "B"  Habilitació        blau    fill=#cfe2ff  stroke=#084298
#   "G"  Mode / Control     verd    fill=#d1e7dd  stroke=#0a3622
#   "A"  Adreça / Codi      ambre   fill=#fff3cd  stroke=#664d03
#   "V"  CF / Estat         vermell fill=#f8d7da  stroke=#842029
#
# Validació automàtica:
#   Per a cada fila, la suma de n_bits de tots els camps ha de ser igual a
#   bit_msb + 1. L'script generador ho verifica i atura l'execució si detecta errors.

# ── Formats d'instrucció RV32I ────────────────────────────────────────────────
# opcode=verd, rd/rs1/rs2=blau, funct3/funct7=ambre, imm=ambre

[registers.T2_instruccio_tipus_R]
title = "Format d'instrucció tipus R (RV32I)"
desc  = "funct7(31–25), rs2(24–20), rs1(19–15), funct3(14–12), rd(11–7), opcode(6–0)."

[[registers.T2_instruccio_tipus_R.rows]]
bit_msb = 31
fields  = [
  ["funct7", 7, "A"],
  ["rs2",    5, "B"],
  ["rs1",    5, "B"],
  ["funct3", 3, "A"],
  ["rd",     5, "B"],
  ["opcode", 7, "G"],
]

[registers.T2_instruccio_tipus_I]
title = "Format d'instrucció tipus I (RV32I)"
desc  = "imm[11:0](31–20), rs1(19–15), funct3(14–12), rd(11–7), opcode(6–0)."

[[registers.T2_instruccio_tipus_I.rows]]
bit_msb = 31
fields  = [
  ["imm[11:0]", 12, "A"],
  ["rs1",        5, "B"],
  ["funct3",     3, "A"],
  ["rd",         5, "B"],
  ["opcode",     7, "G"],
]

[registers.T2_instruccio_tipus_S]
title = "Format d'instrucció tipus S (RV32I)"
desc  = "imm[11:5](31–25), rs2(24–20), rs1(19–15), funct3(14–12), imm[4:0](11–7), opcode(6–0)."

[[registers.T2_instruccio_tipus_S.rows]]
bit_msb = 31
fields  = [
  ["imm[11:5]", 7, "A"],
  ["rs2",       5, "B"],
  ["rs1",       5, "B"],
  ["funct3",    3, "A"],
  ["imm[4:0]",  5, "A"],
  ["opcode",    7, "G"],
]

[registers.T3_instruccio_tipus_B]
title = "Format d'instrucció tipus B (RV32I)"
desc  = "imm[12,10:5](31–25), rs2(24–20), rs1(19–15), funct3(14–12), imm[4:1,11](11–7), opcode(6–0)."

[[registers.T3_instruccio_tipus_B.rows]]
bit_msb = 31
fields  = [
  ["imm[12,10:5]", 7, "A"],
  ["rs2",          5, "B"],
  ["rs1",          5, "B"],
  ["funct3",       3, "A"],
  ["imm[4:1,11]",  5, "A"],
  ["opcode",       7, "G"],
]

[registers.T3_instruccio_tipus_U]
title = "Format d'instrucció tipus U (RV32I)"
desc  = "imm[31:12](31–12), rd(11–7), opcode(6–0)."

[[registers.T3_instruccio_tipus_U.rows]]
bit_msb = 31
fields  = [
  ["imm[31:12]", 20, "A"],
  ["rd",          5, "B"],
  ["opcode",      7, "G"],
]

[registers.T3_instruccio_tipus_J]
title = "Format d'instrucció tipus J (RV32I)"
desc  = "imm[20,10:1,11,19:12](31–12), rd(11–7), opcode(6–0)."

[[registers.T3_instruccio_tipus_J.rows]]
bit_msb = 31
fields  = [
  ["imm[20,10:1,11,19:12]", 20, "A"],
  ["rd",                     5, "B"],
  ["opcode",                 7, "G"],
]

[registers.T5_instruccio_tipus_R4]
title = "Format d'instrucció tipus R4 (RV32F)"
desc  = "fs3(31–27), funct2(26–25), fs2(24–20), fs1(19–15), funct3(14–12), fd(11–7), opcode(6–0)."

[[registers.T5_instruccio_tipus_R4.rows]]
bit_msb = 31
fields  = [
  ["fs3",    5, "B"],
  ["funct2", 2, "A"],
  ["fs2",    5, "B"],
  ["fs1",    5, "B"],
  ["funct3", 3, "A"],
  ["fd",     5, "B"],
  ["opcode", 7, "G"],
]

# ── T5: fcsr ──────────────────────────────────────────────────────────────────

[registers.T5_fcsr]
title = "Registre de control i estat de coma flotant fcsr (RV32F)"
desc  = "Reserved(31–8), RM(7–5), NV(4), DZ(3), OF(2), UF(1), NX(0)."

[[registers.T5_fcsr.rows]]
bit_msb = 31
fields  = [
  ["Reserved", 24, "R"],
  ["RM",        3, "V"],
  ["NV",        1, "B"],
  ["DZ",        1, "B"],
  ["OF",        1, "B"],
  ["UF",        1, "B"],
  ["NX",        1, "B"],
]

# ── T9: mstatus ───────────────────────────────────────────────────────────────
# Priv Spec 1.12 RV32:
# 31:SD  30–23:WPRI  22:TSR  21:TW  20:TVM  19:MXR  18:SUM  17:MPRV
# 16–15:XS  14–13:FS  12–11:MPP  10–9:VS  8:SPP
# 7:MPIE  6:UBE  5:SPIE  4:WPRI  3:MIE  2:WPRI  1:SIE  0:WPRI

[registers.T9_mstatus]
title = "Registre d'estat de màquina mstatus (RV32I Zicsr)"
desc  = "SD(31), WPRI(30–23), TSR(22), TW(21), TVM(20), MXR(19), SUM(18), MPRV(17), XS(16–15), FS(14–13), MPP(12–11), VS(10–9), SPP(8), MPIE(7), UBE(6), SPIE(5), WPRI(4), MIE(3), WPRI(2), SIE(1), WPRI(0)."

[[registers.T9_mstatus.rows]]
bit_msb = 31
fields  = [
  ["SD",   1, "A"],
  ["WPRI", 8, "R"],
  ["TSR",  1, "A"],
  ["TW",   1, "A"],
  ["TVM",  1, "A"],
  ["MXR",  1, "A"],
  ["SUM",  1, "A"],
  ["MPRV", 1, "A"],
  ["XS",   2, "V"],
  ["FS",   2, "V"],
  ["MPP",  2, "G"],
  ["VS",   2, "V"],
  ["SPP",  1, "G"],
  ["MPIE", 1, "B"],
  ["UBE",  1, "R"],
  ["SPIE", 1, "B"],
  ["WPRI", 1, "R"],
  ["MIE",  1, "B"],
  ["WPRI", 1, "R"],
  ["SIE",  1, "B"],
  ["WPRI", 1, "R"],
]

# ── T9: mtvec ─────────────────────────────────────────────────────────────────

[registers.T9_mtvec]
title = "Registre de vector de trampa mtvec (RV32I Zicsr)"
desc  = "base(31–2): adreça base del gestor. mode(1–0): 0=directe, 1=vectoritzat."

[[registers.T9_mtvec.rows]]
bit_msb = 31
fields  = [
  ["base[31:2]", 30, "A"],
  ["mode",        2, "G"],
]

# ── T9: mepc ──────────────────────────────────────────────────────────────────

[registers.T9_mepc]
title = "Registre de comptador de programa d'excepció mepc (RV32I Zicsr)"
desc  = "El registre mepc (32 bits) conté l'adreça de la instrucció que va causar l'excepció o, en el cas d'interrupcions, la de la instrucció següent."

[[registers.T9_mepc.rows]]
bit_msb = 31
fields  = [
  ["mepc", 32, "A"],
]

# ── T9: mcause ────────────────────────────────────────────────────────────────

[registers.T9_mcause]
title = "Registre de causa de trampa mcause (RV32I Zicsr)"
desc  = "Int.(31) [Interrupt]: 1=interrupció, 0=excepció. Exception Code(30–0): codi de causa."

[[registers.T9_mcause.rows]]
bit_msb = 31
fields  = [
  ["Int.",           1, "G"],   # abrev. d'Interrupt; nom complet a desc i caption Quarto
  ["Exception Code", 31, "A"],
]

# ── T9: mip ───────────────────────────────────────────────────────────────────
# Priv Spec 1.12: bits 31–12 WPRI; 11:MEIP 10:WPRI 9:SEIP 8:WPRI
#                 7:MTIP 6:WPRI 5:STIP 4:WPRI 3:MSIP 2:WPRI 1:SSIP 0:WPRI

[registers.T9_mip]
title = "Registre d'interrupcions pendents mip (RV32I Zicsr)"
desc  = "MEIP(11), SEIP(9), MTIP(7), STIP(5), MSIP(3), SSIP(1); resta WPRI."

[[registers.T9_mip.rows]]
bit_msb = 31
fields  = [
  ["WPRI", 20, "R"],
  ["MEIP",  1, "B"],
  ["WPRI",  1, "R"],
  ["SEIP",  1, "B"],
  ["WPRI",  1, "R"],
  ["MTIP",  1, "B"],
  ["WPRI",  1, "R"],
  ["STIP",  1, "B"],
  ["WPRI",  1, "R"],
  ["MSIP",  1, "B"],
  ["WPRI",  1, "R"],
  ["SSIP",  1, "B"],
  ["WPRI",  1, "R"],
]

# ── T9: mie ───────────────────────────────────────────────────────────────────

[registers.T9_mie]
title = "Registre d'habilitació d'interrupcions mie (RV32I Zicsr)"
desc  = "MEIE(11), SEIE(9), MTIE(7), STIE(5), MSIE(3), SSIE(1); resta WPRI."

[[registers.T9_mie.rows]]
bit_msb = 31
fields  = [
  ["WPRI", 20, "R"],
  ["MEIE",  1, "B"],
  ["WPRI",  1, "R"],
  ["SEIE",  1, "B"],
  ["WPRI",  1, "R"],
  ["MTIE",  1, "B"],
  ["WPRI",  1, "R"],
  ["STIE",  1, "B"],
  ["WPRI",  1, "R"],
  ["MSIE",  1, "B"],
  ["WPRI",  1, "R"],
  ["SSIE",  1, "B"],
  ["WPRI",  1, "R"],
]

# ── T9: satp (SV32) ───────────────────────────────────────────────────────────

[registers.T9_satp]
title = "Registre de control de traducció satp en mode SV32 (Supervisor ISA)"
desc  = "MODE(31): activa la traducció. ASID(30–22): identificador d'espai d'adreces. PPN(21–0): pàgina física de la taula de pàgines arrel."

[[registers.T9_satp.rows]]
bit_msb = 31
fields  = [
  ["MODE",  1, "G"],
  ["ASID",  9, "B"],
  ["PPN",  22, "A"],
]
