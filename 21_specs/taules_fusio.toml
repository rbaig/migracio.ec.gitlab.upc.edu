# taules_fusio.toml — Fusions de fragments de taula per a 05_riscv.qmd
#
# Font de veritat per a 22_scripts/gen_taules_auto.py.
#
# Motiu: quan una taula de 05_riscv.qmd combina files de més d'un fragment
# de 11_riscv/ (p. ex. instruccions aritmètiques + `lui` sota un sol header),
# Quarto NO permet encadenar dos {{< include >}} consecutius dins la mateixa
# taula pipe: el primer include tanca la taula i la resta es renderitza com
# a text cru (line block de Pandoc). Vegeu 07_contrib.qmd §Fitxer de
# referència tècnica per als detalls.
#
# Cada entrada [[fusio]] genera un fitxer `<sortida>.qmd` a 11_riscv_auto/
# (directori generat, gitignored) concatenant el contingut literal dels
# fitxers `fonts` (relatius a 11_riscv/), en l'ordre indicat. 05_riscv.qmd
# inclou aquest fitxer generat amb un únic {{< include >}}.
#
# IMPORTANT: aquest script NO es crida des del pre-render de _quarto.yml
# (s'executaria massa tard: Quarto resol els {{< include >}} dels capítols
# abans del pre-render). Cal executar-lo manualment; vegeu README.md.
#
# No editeu els fitxers de 11_riscv_auto/: es generen amb
#   python3 22_scripts/gen_taules_auto.py 21_specs/taules_fusio.toml 11_riscv --output-dir="11_riscv_auto/"
# Per canviar el contingut, editeu els fitxers font a 11_riscv/.

[[fusio]]
sortida = "RV32I_instruccions_aritmetiques_lui"
fonts = ["RV32I_instruccions_aritmetiques.qmd", "RV32I_instruccions_lui.qmd"]

[[fusio]]
sortida = "RV32I_instruccions_desplacament_bits"
fonts = [
    "RV32I_instruccions_desplacament_bits_logics.qmd",
    "RV32I_instruccions_desplacament_bits_aritmetics.qmd",
]

[[fusio]]
sortida = "RV32I_instruccions_salt_incondicional_tot"
fonts = [
    "RV32I_instruccions_salt_incondicional.qmd",
    "RV32I_instruccions_salt_incondicional_indirecte.qmd",
]

[[fusio]]
sortida = "RV32I_pseudo_aritmetica_tot"
fonts = ["RV32I_pseudo_mv.qmd", "RV32I_pseudo_neg.qmd", "RV32I_pseudo_not.qmd"]

[[fusio]]
sortida = "RV32I_pseudo_salt_incondicional_tot"
fonts = ["RV32I_pseudo_j.qmd", "RV32I_pseudo_salt_indirecte.qmd"]

[[fusio]]
sortida = "RV32M_instruccions_tot"
fonts = ["RV32M_instruccions_multiplicacio.qmd", "RV32M_instruccions_divisio.qmd"]

[[fusio]]
sortida = "RV32F_instruccions_moviment_tot"
fonts = ["RV32F_instruccions_moviment.qmd", "RV32F_instruccions_moviment_bits.qmd"]

# Zicsr_instruccions.qmd ja no necessita fusió: a 05_riscv.qmd s'inclou tot sol
# (Zicsr_pseudo_immediats.qmd se n'ha exclòs perquè la seva única font a T9.qmd
# és un callout d'Aprofundiment; vegeu 07_contrib.qmd §Fitxer de referència
# tècnica). El fitxer Zicsr_pseudo_immediats.qmd es manté per a l'ús a T9.qmd.
