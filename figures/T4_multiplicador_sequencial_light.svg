<svg width="420" height="440" viewBox="0 0 420 440" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Circuit multiplicador seqüencial (mode clar)</title>
<desc>Esquema del circuit multiplicador seqüencial: el registre MD (2n bits) conte el multiplicand i es desplaca a l'esquerra; el registre MR (n bits) conte el multiplicador i es desplaca a la dreta; el sumador acumula MD dins el registre P (2n bits) quan el bit de menys pes de MR es 1. El resultat es el producte z, que queda a P.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6c757d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ============ MD (multiplicand, 2n bits, desplaca esquerra) ============ -->
<text x="220" y="40" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#6c757d" text-anchor="middle">&#8592; desplacament a l'esquerra (&#215; 2)</text>
<rect x="110" y="60" width="220" height="44" rx="3" fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
<text x="220" y="80" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#084298" text-anchor="middle">MD</text>
<text x="220" y="96" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#084298" text-anchor="middle">2n bits &#183; multiplicand</text>

<!-- entrada x -->
<line x1="44" y1="82" x2="108" y2="82" stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>
<text x="38" y="86" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#084298" text-anchor="end">x</text>

<!-- MD -> sumador -->
<line x1="220" y1="104" x2="220" y2="135" stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ============ Sumador ============ -->
<rect x="150" y="135" width="140" height="44" rx="3" fill="#f8f9fa" stroke="#6c757d" stroke-width="1"/>
<text x="220" y="155" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Sumador  +</text>
<text x="220" y="170" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#6c757d" text-anchor="middle">(2n bits)</text>

<!-- sumador -> P -->
<line x1="220" y1="179" x2="220" y2="250" stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ============ P (acumulador, 2n bits) ============ -->
<rect x="110" y="250" width="220" height="44" rx="3" fill="#d1e7dd" stroke="#0a3622" stroke-width="1"/>
<text x="220" y="270" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#0a3622" text-anchor="middle">P</text>
<text x="220" y="286" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#0a3622" text-anchor="middle">2n bits &#183; acumulador (producte z)</text>

<!-- realimentacio P -> sumador (esquerra) -->
<line x1="110" y1="272" x2="70" y2="272" stroke="#6c757d" stroke-width="1"/>
<line x1="70" y1="272" x2="70" y2="157" stroke="#6c757d" stroke-width="1"/>
<line x1="70" y1="157" x2="150" y2="157" stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>
<text x="78" y="150" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#0a3622" text-anchor="start">P</text>

<!-- ============ MR (multiplicador, n bits, desplaca dreta) ============ -->
<rect x="110" y="350" width="160" height="44" rx="3" fill="#fff3cd" stroke="#664d03" stroke-width="1"/>
<text x="190" y="370" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#664d03" text-anchor="middle">MR</text>
<text x="190" y="386" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#664d03" text-anchor="middle">n bits &#183; multiplicador</text>
<text x="190" y="414" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#6c757d" text-anchor="middle">desplacament a la dreta (&#247; 2) &#8594;</text>

<!-- entrada y -->
<line x1="44" y1="372" x2="108" y2="372" stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>
<text x="38" y="376" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#664d03" text-anchor="end">y</text>

<!-- control MR[0] -> escriptura de P (dashed) -->
<line x1="270" y1="372" x2="370" y2="372" stroke="#664d03" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="370" y1="372" x2="370" y2="224" stroke="#664d03" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="370" y1="224" x2="226" y2="224" stroke="#664d03" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
<text x="320" y="366" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#664d03" text-anchor="middle">MR[0]</text>
<text x="298" y="216" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#664d03" text-anchor="middle">suma si MR[0] = 1</text>

</svg>
