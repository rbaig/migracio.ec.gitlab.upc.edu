<svg width="680" height="410" viewBox="0 0 680 410" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Recorreguts de matrius i els strides corresponents (mode fosc)</title>
<desc>Quatre diagrames mostrant els patrons de recorregut: una fila i una columna en matrius 4x5, diagonal principal i secundària en matrius 4x4.</desc>

<!-- TÍTOLS -->
<text x="170" y="44" font-family="'Source Sans Pro', sans-serif" font-size="13" font-weight="500" fill="#fff" text-anchor="middle">Una fila</text>
<text x="510" y="44" font-family="'Source Sans Pro', sans-serif" font-size="13" font-weight="500" fill="#fff" text-anchor="middle">Una columna</text>
<text x="170" y="234" font-family="'Source Sans Pro', sans-serif" font-size="13" font-weight="500" fill="#fff" text-anchor="middle">Diagonal principal</text>
<text x="510" y="234" font-family="'Source Sans Pro', sans-serif" font-size="13" font-weight="500" fill="#fff" text-anchor="middle">Diagonal secundària</text>

<!-- STRIDES -->
<text x="170" y="206" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#adb5bd" text-anchor="middle">stride = T</text>
<text x="510" y="206" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#adb5bd" text-anchor="middle">stride = NC · T</text>
<text x="170" y="392" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#adb5bd" text-anchor="middle">stride = (NC + 1) · T</text>
<text x="510" y="392" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#adb5bd" text-anchor="middle">stride = (NC − 1) · T</text>

