<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="560"
   height="197"
   viewBox="0 0 560 197"
   font-family="'Liberation Sans', Arial, Helvetica, sans-serif"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1,1 9,5 1,9 z" fill="#90bfff"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1,1 9,5 1,9 z" fill="#cc0000"/>
    </marker>
  </defs>

  <!-- CAPA 1: TEXT DEL CODI -->
  <text font-family="'Liberation Mono', 'Courier New', Courier, monospace" font-size="12" fill="#ffffff">
    <tspan x="14.0" y="22">char exemple(int a, int b, int c) {</tspan>
    <tspan x="42.8" y="40">int d, e, q;</tspan>
    <tspan x="42.8" y="58">char v[18], w[20];</tspan>
    <tspan x="42.8" y="76">d = a + b;</tspan>
    <tspan x="42.8" y="97">res_f = f(d, &amp;q);</tspan>
    <tspan x="42.8" y="128">res_g = g(v, w);</tspan>
    <tspan x="42.8" y="149">e = res_g + res_f;</tspan>
    <tspan x="42.8" y="163">return v[e + q] + w[d + c];</tspan>
    <tspan x="14.0" y="177">}</tspan>
  </text>

  <!-- CAPA 2: FRONTERES DE CRIDA -->
  <line x1="14" y1="87"  x2="300" y2="87"
        stroke="#adb5bd" stroke-width="1.2" stroke-dasharray="6,4"/>
  <line x1="14" y1="107" x2="500" y2="107"
        stroke="#adb5bd" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="310" y="100" font-size="10" font-style="italic" fill="#adb5bd">codi anterior a la crida a f</text>
  <text x="310" y="115" font-size="10" font-style="italic" fill="#adb5bd">codi posterior a la crida a f</text>

  <line x1="14" y1="118" x2="300" y2="118"
        stroke="#adb5bd" stroke-width="1.2" stroke-dasharray="6,4"/>
  <line x1="14" y1="138" x2="500" y2="138"
        stroke="#adb5bd" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="310" y="131" font-size="10" font-style="italic" fill="#adb5bd">codi anterior a la crida a g</text>
  <text x="310" y="146" font-size="10" font-style="italic" fill="#adb5bd">codi posterior a la crida a g</text>

  <!-- CAPA 3: FLETXES -->
  <!-- a (blau): signatura → final de franja f (s'usa com argument a f) -->
  <line x1="140.1" y1="27" x2="140.1" y2="112"
        stroke="#90bfff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- b (blau): signatura → final de franja g (s'usa com argument a g) -->
  <line x1="190.5" y1="27" x2="190.5" y2="143"
        stroke="#90bfff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- c (blau): signatura → return c (col 24) -->
  <line x1="240.9" y1="27" x2="219.3" y2="155"
        stroke="#90bfff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- d (blau): d=a+b → return d (col 20) -->
  <path d="M 46,80 C 46,110 175,140 190,155"
        fill="none" stroke="#90bfff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- res_f (vermell): oval → e a e=res_g+res_f -->
  <path d="M 84,97 C 130,97 118,145 111,145"
        fill="none" stroke="#cc0000" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <!-- res_g (vermell): oval → e a e=res_g+res_f -->
  <path d="M 84,128 C 118,128 113,145 111,145"
        fill="none" stroke="#cc0000" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- CAPA 4: CERCLES i ÒVALS -->
  <!-- Cercles BLAUS signatura: a col17, b col24, c col31 -->
  <circle cx="140.1" cy="18.5" r="9" fill="none" stroke="#90bfff" stroke-width="1.5"/>
  <circle cx="190.5" cy="18.5" r="9" fill="none" stroke="#90bfff" stroke-width="1.5"/>
  <circle cx="240.9" cy="18.5" r="9" fill="none" stroke="#90bfff" stroke-width="1.5"/>
  <!-- Cercle BLAU d a d=a+b -->
  <circle cx="46.4"  cy="72.5" r="9" fill="none" stroke="#90bfff" stroke-width="1.5"/>
  <!-- Òvals VERMELLS res_f, res_g -->
  <ellipse cx="60.8" cy="93.5"  rx="23" ry="9" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <ellipse cx="60.8" cy="124.5" rx="23" ry="9" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <!-- Cercle VERMELL e al return (col 9) -->
  <circle cx="111.2" cy="159.5" r="9" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <!-- Cercles BLAUS al return: d col20, c col24 -->
  <circle cx="190.5" cy="159.5" r="9" fill="none" stroke="#90bfff" stroke-width="1.5"/>
  <circle cx="219.3" cy="159.5" r="9" fill="none" stroke="#90bfff" stroke-width="1.5"/>

</svg>
