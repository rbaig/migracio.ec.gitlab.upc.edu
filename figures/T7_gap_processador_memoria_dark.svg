<svg width="620" height="340" viewBox="0 0 620 340" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Evolució del rendiment relatiu de processador i memòria 1980–2010 (mode clar)</title>
<desc>Gràfica de línies amb escala logarítmica que mostra la divergència creixent entre el rendiment del processador i el de la memòria principal entre 1980 i 2010.</desc>

<!-- Àrea del gràfic: x=70..480, y=30..280 → amplada=410, alçada=250 -->
<!-- Eix X: 1980..2010, 7 marques separades 68.3px -->
<!-- Eix Y log: 1..100000, 5 dècades, 50px cadascuna -->

<!-- Quadrícula horitzontal -->
<line x1="70" y1="280" x2="480" y2="280" stroke="#dee2e6" stroke-width="0.5"/>
<line x1="70" y1="230" x2="480" y2="230" stroke="#dee2e6" stroke-width="0.5"/>
<line x1="70" y1="180" x2="480" y2="180" stroke="#dee2e6" stroke-width="0.5"/>
<line x1="70" y1="130" x2="480" y2="130" stroke="#dee2e6" stroke-width="0.5"/>
<line x1="70" y1="80"  x2="480" y2="80"  stroke="#dee2e6" stroke-width="0.5"/>
<line x1="70" y1="30"  x2="480" y2="30"  stroke="#dee2e6" stroke-width="0.5"/>

<!-- Quadrícula vertical -->
<line x1="70"  y1="30" x2="70"  y2="280" stroke="#dee2e6" stroke-width="0.5"/>
<line x1="138" y1="30" x2="138" y2="280" stroke="#dee2e6" stroke-width="0.5"/>
<line x1="206" y1="30" x2="206" y2="280" stroke="#dee2e6" stroke-width="0.5"/>
<line x1="274" y1="30" x2="274" y2="280" stroke="#dee2e6" stroke-width="0.5"/>
<line x1="342" y1="30" x2="342" y2="280" stroke="#dee2e6" stroke-width="0.5"/>
<line x1="410" y1="30" x2="410" y2="280" stroke="#dee2e6" stroke-width="0.5"/>
<line x1="480" y1="30" x2="480" y2="280" stroke="#dee2e6" stroke-width="0.5"/>

<!-- Eixos -->
<line x1="70" y1="280" x2="488" y2="280" stroke="#888888" stroke-width="1"/>
<line x1="70" y1="280" x2="70"  y2="20"  stroke="#888888" stroke-width="1"/>

<!-- Etiquetes eix Y -->
<text x="62" y="284" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="end">1</text>
<text x="62" y="234" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="end">10</text>
<text x="62" y="184" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="end">100</text>
<text x="62" y="134" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="end">1.000</text>
<text x="62" y="84"  font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="end">10.000</text>
<text x="62" y="34"  font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="end">100.000</text>

<!-- Etiquetes eix X -->
<text x="70"  y="296" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="middle">1980</text>
<text x="138" y="296" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="middle">1985</text>
<text x="206" y="296" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="middle">1990</text>
<text x="274" y="296" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="middle">1995</text>
<text x="342" y="296" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="middle">2000</text>
<text x="410" y="296" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="middle">2005</text>
<text x="480" y="296" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="middle">2010</text>

<!-- Títol eix Y -->
<text x="16" y="155" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="middle" transform="rotate(-90,16,155)">Rendiment relatiu</text>

<!--
Corba Processador (blau): creixement ~55% anual fins 2003, ~20% anual després
y = 280 - 50*log10(val), x = 70 + (any-1980)/30*410
1980: 1       y=280  x=70
1981: 1.55    y=271  x=83.7
1982: 2.4     y=262  x=97.3
1983: 3.7     y=251  x=111
1984: 5.7     y=239  x=124.7
1985: 8.8     y=227  x=138
1986: 13.7    y=214  x=151.7
1987: 21      y=201  x=165.3
1988: 33      y=188  x=179
1989: 51      y=175  x=192.7
1990: 79      y=162  x=206
1991: 120     y=154  x=219.7  (lleugera inflexió)
1992: 175     y=143  x=233.3
1993: 250     y=130  x=247
1994: 350     y=120  x=260.7
1995: 500     y=110  x=274
1996: 700     y=102  x=287.7
1997: 1000    y=93   x=301.3
1998: 1400    y=86   x=315
1999: 2000    y=80   x=328.7
2000: 2800    y=75   x=342
2001: 3800    y=71   x=355.7
2002: 5000    y=67   x=369.3
2003: 6500    y=64   x=383   (inflexió: canvi a ~20%/any)
2004: 7800    y=62   x=396.7
2005: 9000    y=60   x=410
2006: 10500   y=58   x=423.7
2007: 12000   y=56   x=437.3
2008: 14000   y=55   x=451
2009: 16000   y=54   x=464.7
2010: 18000   y=53   x=480
-->
<polyline
  points="70,280 83,271 97,262 111,251 125,239 138,227 152,214 165,201 179,188 193,175 206,162 220,154 233,143 247,130 261,120 274,110 288,102 301,93 315,86 329,80 342,75 356,71 369,67 383,64 397,62 410,60 424,58 437,56 451,55 465,54 480,53"
  fill="none" stroke="#90bfff" stroke-width="2" stroke-linejoin="round"/>

<!--
Corba Memòria (verd): creixement ~7% anual
1980: 1     y=280  x=70
1982: 1.14  y=274  x=97
1985: 1.40  y=273  x=138
1988: 1.72  y=268  x=179
1990: 2.0   y=265  x=206
1993: 2.45  y=259  x=247
1995: 2.80  y=257  x=274
1998: 3.43  y=253  x=315
2000: 4.0   y=250  x=342
2003: 4.9   y=246  x=383
2005: 5.6   y=244  x=410
2008: 6.9   y=241  x=451
2010: 8.0   y=238  x=480
-->
<polyline
  points="70,280 97,274 138,273 179,268 206,265 247,259 274,257 315,253 342,250 383,246 410,244 451,241 480,238"
  fill="none" stroke="#90d4aa" stroke-width="2" stroke-linejoin="round"/>

<!-- Etiquetes corbes -->
<text x="485" y="57"  font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#90bfff" text-anchor="start">Processador</text>
<text x="485" y="242" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#90d4aa" text-anchor="start">Memòria</text>

<!-- Anotació gap (línia discontínua vertical a 2010) -->
<line x1="480" y1="53"  x2="480" y2="238" stroke="#888888" stroke-width="0.75" stroke-dasharray="4,3"/>
<text x="468" y="150" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="middle" transform="rotate(-90,468,150)">gap creixent</text>

</svg>
