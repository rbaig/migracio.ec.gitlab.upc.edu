<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="610"
   height="212"
   viewBox="0 0 610 212"
   font-family="'Source Sans Pro', sans-serif"
   role="img"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <title>Flux de compilació separada (mode clar)</title>
  <desc>Diagrama que mostra el flux de compilació separada: p1.c i p9.c es compilen i assemblen independentment generant p1.o i p9.o, que l'enllaçador (ld) combina amb lib.a per produir l'executable.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10"
            refX="8" refY="5"
            markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
      <path d="M 2,1 8,5 2,9"
            fill="none" stroke="#adb5bd"
            stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===== NODES ===== -->

  <!-- p1.c  x=20 y=40 -->
  <rect x="20" y="40" width="90" height="32" rx="4"
        fill="#1a3a5c" stroke="#90bfff" stroke-width="1"/>
  <text x="65" y="61" text-anchor="middle" font-size="12" font-weight="bold" fill="#90bfff">p1.c</text>

  <!-- p9.c  x=20 y=100 -->
  <rect x="20" y="100" width="90" height="32" rx="4"
        fill="#1a3a5c" stroke="#90bfff" stroke-width="1"/>
  <text x="65" y="121" text-anchor="middle" font-size="12" font-weight="bold" fill="#90bfff">p9.c</text>

  <!-- lib.a  x=260 y=160 (sota p9.o) -->
  <rect x="260" y="160" width="90" height="32" rx="4"
        fill="#3a2e00" stroke="#ffd966" stroke-width="1"/>
  <text x="305" y="181" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffd966">lib.a</text>

  <!-- gcc -S / as (per p1.c)  x=140 y=40 -->
  <rect x="140" y="40" width="90" height="32" rx="4"
        fill="#3d3d3d" stroke="#888888" stroke-width="0.5"/>
  <text x="185" y="54" text-anchor="middle" font-size="10" fill="#adb5bd">gcc -S</text>
  <text x="185" y="66" text-anchor="middle" font-size="10" fill="#adb5bd">/ as</text>

  <!-- gcc -S / as (per p9.c)  x=140 y=100 -->
  <rect x="140" y="100" width="90" height="32" rx="4"
        fill="#3d3d3d" stroke="#888888" stroke-width="0.5"/>
  <text x="185" y="114" text-anchor="middle" font-size="10" fill="#adb5bd">gcc -S</text>
  <text x="185" y="126" text-anchor="middle" font-size="10" fill="#adb5bd">/ as</text>

  <!-- p1.o  x=260 y=40 -->
  <rect x="260" y="40" width="90" height="32" rx="4"
        fill="#1a3a2a" stroke="#90d4aa" stroke-width="1"/>
  <text x="305" y="57" text-anchor="middle" font-size="12" font-weight="bold" fill="#90d4aa">p1.o</text>
  <text x="305" y="70" text-anchor="middle" font-size="10" fill="#90d4aa">(.o)</text>

  <!-- p9.o  x=260 y=100 -->
  <rect x="260" y="100" width="90" height="32" rx="4"
        fill="#1a3a2a" stroke="#90d4aa" stroke-width="1"/>
  <text x="305" y="117" text-anchor="middle" font-size="12" font-weight="bold" fill="#90d4aa">p9.o</text>
  <text x="305" y="130" text-anchor="middle" font-size="10" fill="#90d4aa">(.o)</text>

  <!-- ld  x=380 y=100 -->
  <rect x="380" y="100" width="90" height="32" rx="4"
        fill="#3d3d3d" stroke="#888888" stroke-width="0.5"/>
  <text x="425" y="121" text-anchor="middle" font-size="12" fill="#adb5bd">ld</text>

  <!-- executable  x=500 y=100 -->
  <rect x="500" y="100" width="90" height="32" rx="4"
        fill="#3a1a1e" stroke="#f1a8ae" stroke-width="1"/>
  <text x="545" y="114" text-anchor="middle" font-size="11" font-weight="bold" fill="#f1a8ae">executable</text>

  <!-- ===== FLETXES SIMPLES (horitzontal) ===== -->

  <!-- p1.c → gcc1 -->
  <line x1="110" y1="56" x2="137" y2="56"
        stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- p9.c → gcc2 -->
  <line x1="110" y1="116" x2="137" y2="116"
        stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- gcc1 → p1.o -->
  <line x1="230" y1="56" x2="257" y2="56"
        stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- gcc2 → p9.o -->
  <line x1="230" y1="116" x2="257" y2="116"
        stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ld → executable -->
  <line x1="470" y1="116" x2="497" y2="116"
        stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== FLETXES DIAGONALS ===== -->

  <!-- p1.o → ld  (baixa de y=56 a y=116) -->
  <path d="M 350,56 C 365,56 365,116 380,116"
        fill="none" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- p9.o → ld  (horitzontal) -->
  <line x1="350" y1="116" x2="377" y2="116"
        stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- lib.a → ld  (de x=350,y=176 fins a x=380,y=116: diagonal curta cap amunt) -->
  <path d="M 350,176 C 365,176 365,116 377,116"
        fill="none" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== PUNTS DE SEPARACIÓ (indica múltiples mòduls) ===== -->
  <!-- Punts suspensius entre p1 i p9 per indicar "..." -->
  <text x="185" y="95" text-anchor="middle" font-size="14" fill="#adb5bd">⋮</text>
  <text x="305" y="95" text-anchor="middle" font-size="14" fill="#adb5bd">⋮</text>

</svg>
