<svg xmlns="http://www.w3.org/2000/svg" width="260" height="188" viewBox="0 0 260 188" font-family="'Source Sans Pro', sans-serif">
  <!-- Títol -->
  <text x="135" y="22" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Vector vec</text>

  <!-- Sentit creixent de les adreces -->
  <defs>
    <marker id="fl" markerWidth="8" markerHeight="8" refX="2" refY="6" orient="auto">
      <path d="M0,0 L2,6 L4,0" fill="none" stroke="#888" stroke-width="0.8"/>
    </marker>
  </defs>
  <line x1="22" y1="44" x2="22" y2="166" stroke="#888" stroke-width="0.5" marker-end="url(#fl)"/>
  <text x="22" y="40" font-size="11" fill="#adb5bd" text-anchor="middle">@</text>

  <!-- Cel·les grises (primer) -->
  <rect x="90" y="36" width="90" height="28" fill="#3d3d3d" stroke="#888" stroke-width="0.5"/>
  <!-- Cel·la destacada blava: vec[8] (lectura, lw) -->
  <rect x="90" y="80" width="90" height="28" fill="#1a3a5c" stroke="#90bfff" stroke-width="1"/>
  <!-- Cel·la destacada verda: vec[12] (escriptura, sw) -->
  <rect x="90" y="124" width="90" height="28" fill="#1a3a2a" stroke="#90d4aa" stroke-width="1"/>

  <!-- Etiquetes d'element (centrades a cada cel·la) -->
  <text x="135" y="54"  font-size="11" fill="#fff" text-anchor="middle">vec[0]</text>
  <text x="135" y="98"  font-size="11" fill="#fff" text-anchor="middle">vec[8]</text>
  <text x="135" y="142" font-size="11" fill="#fff" text-anchor="middle">vec[12]</text>

  <!-- Punts suspensius (continuïtat) -->
  <text x="135" y="76"  font-size="12" fill="#adb5bd" text-anchor="middle">⋮</text>
  <text x="135" y="120" font-size="12" fill="#adb5bd" text-anchor="middle">⋮</text>
  <text x="135" y="164" font-size="12" fill="#adb5bd" text-anchor="middle">⋮</text>

  <!-- Adreces (alineades a la dreta) -->
  <text x="84" y="54"  font-size="11" fill="#adb5bd" text-anchor="end">@vec</text>
  <text x="84" y="98"  font-size="11" fill="#90bfff" text-anchor="end">@vec+32</text>
  <text x="84" y="142" font-size="11" fill="#90d4aa" text-anchor="end">@vec+48</text>

  <!-- Operacions (a la dreta) -->
  <text x="188" y="98"  font-size="11" fill="#90bfff" text-anchor="start">← lw</text>
  <text x="188" y="142" font-size="11" fill="#90d4aa" text-anchor="start">← sw</text>
</svg>
