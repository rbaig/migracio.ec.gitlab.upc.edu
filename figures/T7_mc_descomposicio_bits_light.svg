  <text
     x="246"
     y="39"
     font-family="'Source Sans Pro', sans-serif"
     font-size="11px"
     fill="#343a40"
     text-anchor="middle"
     id="text6">0001 0000 0000 0001 0000 0000 1111</text>
  <!-- offset: bits 3..0 (4 bits, destacat verd) -->
