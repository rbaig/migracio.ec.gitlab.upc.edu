  <title
     id="title1">Descomposició dels bits d'una adreça en num_bloc i offset (mode clar)</title>
  <desc
     id="desc1">Descomposició dels 32 bits de l'adreça 0x100100F8 en num_bloc (28 bits) i offset (4 bits), i de l'offset en word_offset (2 bits) i byte dins el word (2 bits), per a blocs de 16 bytes.</desc>
  <!-- 
32 bits, cada bit = 16px d'amplada → amplada total = 512px
x inicial = 54 (marge esquerre per etiquetes)
y fila 1 (adreça): 30
y fila 2 (num_bloc / offset): 90
y fila 3 (word_offset / byte): 150

Bits 31..4 → num_bloc (28 bits) → x=54..503
Bits 3..0  → offset    (4 bits) → x=503..567 (però 32*16=512, x_fi=54+512=566)

Partició:
  num_bloc: bits 31..4 → 28 bits → x=54, w=28*16=448 → x_fi=502
  offset:   bits 3..0  →  4 bits → x=502, w=4*16=64  → x_fi=566

  word_offset: bits 3..2 → 2 bits → x=502, w=32 → x_fi=534
  byte_word:   bits 1..0 → 2 bits → x=534, w=32 → x_fi=566
-->
  <!-- Etiquetes esquerra -->
  <text
     x="16"
     y="42"
     font-family="'Source Sans Pro', sans-serif"
     font-size="12px"
     fill="#343a40"
     text-anchor="end"
     font-style="italic"
     id="text1">A</text>
  <text
     x="16"
     y="122"
     font-family="'Source Sans Pro', sans-serif"
     font-size="12px"
     fill="#343a40"
     text-anchor="end"
     font-style="italic"
     id="text2">A</text>
  <!-- Numeració bits: 31 a l'esquerra, 0 a la dreta -->
  <text
     x="30"
     y="14"
     font-family="'Source Sans Pro', sans-serif"
     font-size="10px"
     fill="#6c757d"
     text-anchor="middle"
     id="text3">31</text>
  <text
     x="526"
     y="14"
     font-family="'Source Sans Pro', sans-serif"
     font-size="10px"
     fill="#6c757d"
     text-anchor="middle"
     id="text4">0</text>
  <text
     x="462"
     y="14"
     font-family="'Source Sans Pro', sans-serif"
     font-size="10px"
     fill="#6c757d"
     text-anchor="middle"
     id="text5">4</text>
  <!-- ===== FILA 1: adreça sencera ===== -->
  <!-- num_bloc: bits 31..4 (28 bits, neutre) -->
