<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Emmagatzematge d'una matriu per files en memòria (mode clar)</title>
<desc>Diagrama que mostra com una matriu mat[4][6] s'emmagatzema en memòria linealment per files: primer la fila 0, després la fila 1, etc.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6c757d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- cel·la: 52x28, 6 col → 6*52=312, inici x=20 → final x=332 -->
<!-- centre col: 20+26=46, 20+52+26=98, 150, 202, 254, 306 -->

<!-- Títols -->
<text x="176" y="28" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#6c757d" text-anchor="middle">representació lògica</text>
<text x="520" y="28" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#6c757d" text-anchor="middle">memòria (lineal)</text>

<!-- Capçaleres columnes -->
