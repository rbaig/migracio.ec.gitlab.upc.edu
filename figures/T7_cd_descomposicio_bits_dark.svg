  <title
     id="title1">Descomposició dels bits d'una adreça per a una memòria cau de correspondència directa (mode clar)</title>
  <desc
     id="desc1">Descomposició dels 32 bits de l'adreça 0x100100F8 en etiqueta (25 bits), índex (3 bits) i offset (4 bits) per a una memòria cau de correspondència directa amb 8 línies i blocs de 16 bytes.</desc>
  <!--
32 bits, cada bit = 16px → amplada total = 512px, x_ini=54, x_fi=566
Partició:
  etiqueta: bits 31..7 → 25 bits → x=54,  w=400, x_fi=454
  índex:    bits 6..4  →  3 bits → x=454, w=48,  x_fi=502
  offset:   bits 3..0  →  4 bits → x=502, w=64,  x_fi=566

Valor adreça 0x100100F8:
  bits 31..7: 0001 0000 0000 0001 0000 0000 1 (etiqueta)
  bits 6..4:  111 (índex = 7)
  bits 3..0:  1000 (offset = 8)
-->
  <!-- Etiqueta esquerra -->
  <text
     x="14"
     y="42"
     font-family="'Liberation Sans', Arial, Helvetica, sans-serif"
     font-size="12px"
     fill="#ffffff"
     text-anchor="end"
     font-style="italic"
     id="text1">A</text>
  <text
     x="14"
     y="114"
     font-family="'Liberation Sans', Arial, Helvetica, sans-serif"
     font-size="12px"
     fill="#ffffff"
     text-anchor="end"
     font-style="italic"
     id="text2">A</text>
  <!-- Numeració bits fila 1 -->
  <text
     x="28"
     y="14"
     font-family="'Liberation Sans', Arial, Helvetica, sans-serif"
     font-size="10px"
     fill="#adb5bd"
     text-anchor="middle"
     id="text3">31</text>
  <text
     x="412"
     y="14"
     font-family="'Liberation Sans', Arial, Helvetica, sans-serif"
     font-size="10px"
     fill="#adb5bd"
     text-anchor="middle"
     id="text4">7</text>
  <text
     x="460"
     y="14"
     font-family="'Liberation Sans', Arial, Helvetica, sans-serif"
     font-size="10px"
     fill="#adb5bd"
     text-anchor="middle"
     id="text5">4</text>
  <text
     x="524"
     y="14"
     font-family="'Liberation Sans', Arial, Helvetica, sans-serif"
     font-size="10px"
     fill="#adb5bd"
     text-anchor="middle"
     id="text6">0</text>
