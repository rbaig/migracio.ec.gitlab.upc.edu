<svg width="680" height="220" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Tecnologies de memòria: capacitat, temps d'accés i cost (mode fosc)</title>
<desc>Taula comparativa de les principals tecnologies d'emmagatzematge: registres, SRAM (memòria cau), DRAM (memòria principal), SSD i disc dur, amb valors típics de capacitat, temps d'accés i cost per GB.</desc>

<!-- Capçalera (gris neutre fosc) -->
<rect x="20"  y="20" width="185" height="30" rx="3" fill="#3d3d3d" stroke="#888" stroke-width="0.5"/>
<rect x="205" y="20" width="130" height="30" rx="3" fill="#3d3d3d" stroke="#888" stroke-width="0.5"/>
<rect x="335" y="20" width="150" height="30" rx="3" fill="#3d3d3d" stroke="#888" stroke-width="0.5"/>
<rect x="485" y="20" width="150" height="30" rx="3" fill="#3d3d3d" stroke="#888" stroke-width="0.5"/>
<text x="112" y="40" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Tecnologia</text>
<text x="270" y="40" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Capacitat típica</text>
<text x="410" y="40" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Temps d'accés</text>
<text x="560" y="40" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">Cost per GB</text>

<!-- Fila 0: Registres (neutre fosc amb contorn blanc) -->
<rect x="20"  y="50" width="185" height="30" rx="3" fill="#3d3d3d" stroke="#fff" stroke-width="1"/>
<rect x="205" y="50" width="130" height="30" rx="3" fill="#3d3d3d" stroke="#fff" stroke-width="1"/>
<rect x="335" y="50" width="150" height="30" rx="3" fill="#3d3d3d" stroke="#fff" stroke-width="1"/>
<rect x="485" y="50" width="150" height="30" rx="3" fill="#3d3d3d" stroke="#fff" stroke-width="1"/>
<text x="112" y="70" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#fff" text-anchor="middle">Registres (SRAM)</text>
<text x="270" y="70" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#fff" text-anchor="middle">~1 KB</text>
<text x="410" y="70" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#fff" text-anchor="middle">~0,25 ns</text>
<text x="560" y="70" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#fff" text-anchor="middle">—</text>

<!-- Fila 1: Memòria cau (blau fosc) -->
<rect x="20"  y="80" width="185" height="30" rx="3" fill="#1a3a5c" stroke="#90bfff" stroke-width="1"/>
<rect x="205" y="80" width="130" height="30" rx="3" fill="#1a3a5c" stroke="#90bfff" stroke-width="1"/>
<rect x="335" y="80" width="150" height="30" rx="3" fill="#1a3a5c" stroke="#90bfff" stroke-width="1"/>
<rect x="485" y="80" width="150" height="30" rx="3" fill="#1a3a5c" stroke="#90bfff" stroke-width="1"/>
<text x="112" y="100" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#90bfff" text-anchor="middle">Memòria cau (SRAM)</text>
<text x="270" y="100" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#90bfff" text-anchor="middle">32 KB – 64 MB</text>
<text x="410" y="100" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#90bfff" text-anchor="middle">0,5 – 5 ns</text>
<text x="560" y="100" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#90bfff" text-anchor="middle">~3.000 $/GB</text>

<!-- Fila 2: Memòria principal (verd fosc) -->
<rect x="20"  y="110" width="185" height="30" rx="3" fill="#1a3a2a" stroke="#90d4aa" stroke-width="1"/>
<rect x="205" y="110" width="130" height="30" rx="3" fill="#1a3a2a" stroke="#90d4aa" stroke-width="1"/>
<rect x="335" y="110" width="150" height="30" rx="3" fill="#1a3a2a" stroke="#90d4aa" stroke-width="1"/>
<rect x="485" y="110" width="150" height="30" rx="3" fill="#1a3a2a" stroke="#90d4aa" stroke-width="1"/>
<text x="112" y="130" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#90d4aa" text-anchor="middle">Mem. principal (DRAM)</text>
<text x="270" y="130" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#90d4aa" text-anchor="middle">8 – 128 GB</text>
<text x="410" y="130" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#90d4aa" text-anchor="middle">50 – 100 ns</text>
<text x="560" y="130" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#90d4aa" text-anchor="middle">~3 $/GB</text>

<!-- Fila 3: SSD (groc fosc) -->
<rect x="20"  y="140" width="185" height="30" rx="3" fill="#3a2e00" stroke="#ffd966" stroke-width="1"/>
<rect x="205" y="140" width="130" height="30" rx="3" fill="#3a2e00" stroke="#ffd966" stroke-width="1"/>
<rect x="335" y="140" width="150" height="30" rx="3" fill="#3a2e00" stroke="#ffd966" stroke-width="1"/>
<rect x="485" y="140" width="150" height="30" rx="3" fill="#3a2e00" stroke="#ffd966" stroke-width="1"/>
<text x="112" y="160" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#ffd966" text-anchor="middle">Mem. secundària (SSD)</text>
<text x="270" y="160" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#ffd966" text-anchor="middle">256 GB – 8 TB</text>
<text x="410" y="160" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#ffd966" text-anchor="middle">0,05 – 0,1 ms</text>
<text x="560" y="160" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#ffd966" text-anchor="middle">~0,08 $/GB</text>

<!-- Fila 4: Disc (vermell fosc) -->
<rect x="20"  y="170" width="185" height="30" rx="3" fill="#3a1a1e" stroke="#f1a8ae" stroke-width="1"/>
<rect x="205" y="170" width="130" height="30" rx="3" fill="#3a1a1e" stroke="#f1a8ae" stroke-width="1"/>
<rect x="335" y="170" width="150" height="30" rx="3" fill="#3a1a1e" stroke="#f1a8ae" stroke-width="1"/>
<rect x="485" y="170" width="150" height="30" rx="3" fill="#3a1a1e" stroke="#f1a8ae" stroke-width="1"/>
<text x="112" y="190" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#f1a8ae" text-anchor="middle">Mem. secundària (disc)</text>
<text x="270" y="190" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#f1a8ae" text-anchor="middle">1 – 20 TB</text>
<text x="410" y="190" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#f1a8ae" text-anchor="middle">5 – 10 ms</text>
<text x="560" y="190" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#f1a8ae" text-anchor="middle">~0,02 $/GB</text>

</svg>
