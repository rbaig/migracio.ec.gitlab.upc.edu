<svg width="580" height="290" viewBox="0 0 580 290" xmlns="http://www.w3.org/2000/svg" role="img">
<title>La jerarquia de memòria (mode clar)</title>
<desc>Diagrama en forma de piràmide de quatre nivells: registres, memòria cau, memòria principal i memòria secundària, amb anotacions de velocitat, cost i capacitat.</desc>

<!-- Nivell 0: Registres (triangle, blau) — costats alineats amb la piràmide -->
<polygon points="290,20 333,72 247,72"
  fill="#1a3a5c" stroke="#90bfff" stroke-width="1"/>
<text x="290" y="54" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#90bfff" text-anchor="middle" font-weight="bold">Regs.</text>

<!-- Nivell 1: Memòria cau (verd) -->
<polygon points="243,76 337,76 380,128 200,128"
  fill="#1a3a2a" stroke="#90d4aa" stroke-width="1"/>
<text x="290" y="108" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#90d4aa" text-anchor="middle" font-weight="bold">Memòria cau</text>

<!-- Nivell 2: Memòria principal (groc) -->
<polygon points="197,132 383,132 427,184 153,184"
  fill="#3a2e00" stroke="#ffd966" stroke-width="1"/>
<text x="290" y="164" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#ffd966" text-anchor="middle" font-weight="bold">Memòria principal (DRAM)</text>

<!-- Nivell 3: Memòria secundària (vermell) -->
<polygon points="150,188 430,188 473,240 107,240"
  fill="#3a1a1e" stroke="#f1a8ae" stroke-width="1"/>
<text x="290" y="220" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" fill="#f1a8ae" text-anchor="middle" font-weight="bold">Memòria secundària (disc / SSD)</text>

<!-- Anotació esquerra: fletxa cap amunt -->
<line x1="90" y1="230" x2="90" y2="50" stroke="#adb5bd" stroke-width="1"/>
<polygon points="90,42 86,54 94,54" fill="#adb5bd"/>
<text x="78" y="140" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="middle" transform="rotate(-90,78,140)">+ velocitat  + cost  − capacitat</text>

<!-- Anotació dreta: fletxa cap avall -->
<line x1="490" y1="50" x2="490" y2="230" stroke="#adb5bd" stroke-width="1"/>
<polygon points="490,238 486,226 494,226" fill="#adb5bd"/>
<text x="502" y="140" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="middle" transform="rotate(90,502,140)">− velocitat  − cost  + capacitat</text>

<!-- Nota inferior -->
<text x="290" y="265" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#adb5bd" text-anchor="middle">els nivells superiors són els més propers a la CPU</text>

</svg>
