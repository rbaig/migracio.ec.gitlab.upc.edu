<svg width="440" height="400" viewBox="0 0 440 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Multiplicador combinacional en arbre (mode clar)</title>
<desc>Esquema d'un multiplicador combinacional en arbre: els productes parcials (X per yi, desplacats i posicions) es calculen en paral.lel i se sumen mitjancant un arbre binari de sumadors. Cada nivell suma parells de resultats en paral.lel, de manera que la profunditat de l'arbre es log2(n) sumadors; per a n igual a 32 son 5 nivells. La sortida es el producte Z de 2n bits.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#adb5bd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="220" y="22" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#adb5bd" text-anchor="middle">productes parcials  (X &#183; y&#7522; desplacats i posicions)</text>

<!-- ===== Nivell 0: productes parcials (8 fulles) ===== -->
<rect x="28"  y="34" width="40" height="26" rx="3" fill="#1a3a5c" stroke="#90bfff" stroke-width="0.75"/>
<rect x="77"  y="34" width="40" height="26" rx="3" fill="#1a3a5c" stroke="#90bfff" stroke-width="0.75"/>
<rect x="126" y="34" width="40" height="26" rx="3" fill="#1a3a5c" stroke="#90bfff" stroke-width="0.75"/>
<rect x="175" y="34" width="40" height="26" rx="3" fill="#1a3a5c" stroke="#90bfff" stroke-width="0.75"/>
<rect x="224" y="34" width="40" height="26" rx="3" fill="#1a3a5c" stroke="#90bfff" stroke-width="0.75"/>
<rect x="273" y="34" width="40" height="26" rx="3" fill="#1a3a5c" stroke="#90bfff" stroke-width="0.75"/>
<rect x="322" y="34" width="40" height="26" rx="3" fill="#1a3a5c" stroke="#90bfff" stroke-width="0.75"/>
<rect x="371" y="34" width="40" height="26" rx="3" fill="#1a3a5c" stroke="#90bfff" stroke-width="0.75"/>
<text x="48"  y="51" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#90bfff" text-anchor="middle">PP0</text>
<text x="97"  y="51" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#90bfff" text-anchor="middle">PP1</text>
<text x="146" y="51" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#90bfff" text-anchor="middle">PP2</text>
<text x="195" y="51" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#90bfff" text-anchor="middle">PP3</text>
<text x="244" y="51" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#90bfff" text-anchor="middle">PP4</text>
<text x="293" y="51" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#90bfff" text-anchor="middle">PP5</text>
<text x="342" y="51" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#90bfff" text-anchor="middle">PP6</text>
<text x="391" y="51" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#90bfff" text-anchor="middle">PP7</text>

<!-- fulles -> nivell 1 -->
<line x1="48"  y1="60" x2="72"  y2="113" stroke="#adb5bd" stroke-width="0.75"/>
<line x1="97"  y1="60" x2="72"  y2="113" stroke="#adb5bd" stroke-width="0.75"/>
<line x1="146" y1="60" x2="170" y2="113" stroke="#adb5bd" stroke-width="0.75"/>
<line x1="195" y1="60" x2="170" y2="113" stroke="#adb5bd" stroke-width="0.75"/>
<line x1="244" y1="60" x2="268" y2="113" stroke="#adb5bd" stroke-width="0.75"/>
<line x1="293" y1="60" x2="268" y2="113" stroke="#adb5bd" stroke-width="0.75"/>
<line x1="342" y1="60" x2="366" y2="113" stroke="#adb5bd" stroke-width="0.75"/>
<line x1="391" y1="60" x2="366" y2="113" stroke="#adb5bd" stroke-width="0.75"/>

<!-- ===== Nivell 1: 4 sumadors ===== -->
<rect x="52"  y="113" width="40" height="26" rx="3" fill="#3d3d3d" stroke="#adb5bd" stroke-width="1"/>
<rect x="150" y="113" width="40" height="26" rx="3" fill="#3d3d3d" stroke="#adb5bd" stroke-width="1"/>
<rect x="248" y="113" width="40" height="26" rx="3" fill="#3d3d3d" stroke="#adb5bd" stroke-width="1"/>
<rect x="346" y="113" width="40" height="26" rx="3" fill="#3d3d3d" stroke="#adb5bd" stroke-width="1"/>
<text x="72"  y="131" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" fill="#adb5bd" text-anchor="middle">+</text>
<text x="170" y="131" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" fill="#adb5bd" text-anchor="middle">+</text>
<text x="268" y="131" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" fill="#adb5bd" text-anchor="middle">+</text>
<text x="366" y="131" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" fill="#adb5bd" text-anchor="middle">+</text>
<text x="424" y="130" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#888888" text-anchor="end">nivell 1</text>

<!-- nivell 1 -> nivell 2 -->
<line x1="72"  y1="139" x2="121" y2="183" stroke="#adb5bd" stroke-width="0.75"/>
<line x1="170" y1="139" x2="121" y2="183" stroke="#adb5bd" stroke-width="0.75"/>
<line x1="268" y1="139" x2="317" y2="183" stroke="#adb5bd" stroke-width="0.75"/>
<line x1="366" y1="139" x2="317" y2="183" stroke="#adb5bd" stroke-width="0.75"/>

<!-- ===== Nivell 2: 2 sumadors ===== -->
<rect x="101" y="183" width="40" height="26" rx="3" fill="#3d3d3d" stroke="#adb5bd" stroke-width="1"/>
<rect x="297" y="183" width="40" height="26" rx="3" fill="#3d3d3d" stroke="#adb5bd" stroke-width="1"/>
<text x="121" y="201" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" fill="#adb5bd" text-anchor="middle">+</text>
<text x="317" y="201" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" fill="#adb5bd" text-anchor="middle">+</text>
<text x="424" y="200" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#888888" text-anchor="end">nivell 2</text>

<!-- nivell 2 -> nivell 3 -->
<line x1="121" y1="209" x2="219" y2="253" stroke="#adb5bd" stroke-width="0.75"/>
<line x1="317" y1="209" x2="219" y2="253" stroke="#adb5bd" stroke-width="0.75"/>

<!-- ===== Nivell 3: 1 sumador ===== -->
<rect x="199" y="253" width="40" height="26" rx="3" fill="#3d3d3d" stroke="#adb5bd" stroke-width="1"/>
<text x="219" y="271" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" fill="#adb5bd" text-anchor="middle">+</text>
<text x="424" y="270" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#888888" text-anchor="end">nivell 3</text>

<!-- nivell 3 -> Z -->
<line x1="219" y1="279" x2="219" y2="313" stroke="#adb5bd" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ===== Z (producte) ===== -->
<rect x="159" y="313" width="120" height="32" rx="3" fill="#1a3a2a" stroke="#90d4aa" stroke-width="1"/>
<text x="219" y="333" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#90d4aa" text-anchor="middle">Z &#183; producte (2n bits)</text>

<!-- nota generalitzacio -->
<text x="220" y="372" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#adb5bd" text-anchor="middle">Cada nivell suma parells en paral&#183;lel: profunditat = &#8968;log&#8322; n&#8969; sumadors.</text>
<text x="220" y="388" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#adb5bd" text-anchor="middle">Amb n = 32 productes parcials &#8594; nomes 5 nivells.</text>

</svg>
