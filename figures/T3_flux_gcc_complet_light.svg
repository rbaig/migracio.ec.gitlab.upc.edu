<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="490"
   height="492"
   viewBox="0 0 490 492"
   font-family="'Source Sans Pro', sans-serif"
   role="img"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <title>Flux de generació complet amb GCC (mode clar)</title>
  <desc>Diagrama del flux complet de generació d'un executable amb GCC: preprocessador, compilador, assemblador i enllaçador.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10"
            refX="8" refY="5"
            markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
      <path d="M 2,1 8,5 2,9"
            fill="none" stroke="#6c757d"
            stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===== SUBGRAPH S2: Programador (x=10..280, y=10..70) ===== -->
  <rect x="10" y="10" width="270" height="70" rx="4"
        fill="none" stroke="#6c757d" stroke-width="1"
        stroke-dasharray="5,4"/>
  <text x="18" y="23" font-size="10" fill="#6c757d">Programador</text>

  <!-- A: Fitxers .c -->
  <rect x="25" y="28" width="110" height="32" rx="4"
        fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
  <text x="80" y="42" text-anchor="middle" font-size="10" font-weight="bold" fill="#084298">Fitxers .c</text>
  <text x="80" y="54" text-anchor="middle" font-size="10" fill="#084298">(Codi font)</text>

  <!-- H1: Fitxers .h -->
  <rect x="150" y="28" width="110" height="32" rx="4"
        fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
  <text x="205" y="42" text-anchor="middle" font-size="10" font-weight="bold" fill="#084298">Fitxers .h</text>
  <text x="205" y="54" text-anchor="middle" font-size="10" fill="#084298">(Capçaleres pròpies)</text>

  <!-- ===== SUBGRAPH S1: Sistema / Instal·lació (x=290..480, y=10..70) ===== -->
  <rect x="290" y="10" width="190" height="70" rx="4"
        fill="none" stroke="#6c757d" stroke-width="1"
        stroke-dasharray="5,4"/>
  <text x="298" y="23" font-size="10" fill="#6c757d">0. Sistema / Instal·lació</text>

  <!-- H2: stdio.h -->
  <rect x="300" y="28" width="80" height="32" rx="4"
        fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
  <text x="340" y="42" text-anchor="middle" font-size="9" font-weight="bold" fill="#084298">stdio.h</text>
  <text x="340" y="54" text-anchor="middle" font-size="9" fill="#084298">(Capçaleres)</text>

  <!-- LIB: libc.a / .so -->
  <rect x="393" y="28" width="80" height="32" rx="4"
        fill="#fff3cd" stroke="#664d03" stroke-width="1"/>
  <text x="433" y="42" text-anchor="middle" font-size="9" font-weight="bold" fill="#664d03">libc.a / .so</text>
  <text x="433" y="54" text-anchor="middle" font-size="9" fill="#664d03">(Biblioteques)</text>

  <!-- ===== FLUX PRINCIPAL (columna central cx=200) ===== -->

  <!-- CP: 1. Preprocessador -->
  <rect x="130" y="100" width="140" height="32" rx="4"
        fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="200" y="120" text-anchor="middle" font-size="11" fill="#6c757d">1. Preprocessador (cpp)</text>

  <!-- I: Fitxers .i -->
  <rect x="145" y="150" width="110" height="32" rx="4"
        fill="#f8f9fa" stroke="#6c757d" stroke-width="1"/>
  <text x="200" y="164" text-anchor="middle" font-size="10" font-weight="bold" fill="#6c757d">Fitxers .i</text>
  <text x="200" y="176" text-anchor="middle" font-size="10" fill="#6c757d">(C expandit)</text>

  <!-- CC: 2. Compilador -->
  <rect x="130" y="200" width="140" height="32" rx="4"
        fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="200" y="220" text-anchor="middle" font-size="11" fill="#6c757d">2. Compilador (cc1)</text>

  <!-- S: Fitxers .s -->
  <rect x="145" y="250" width="110" height="32" rx="4"
        fill="#f8d7da" stroke="#842029" stroke-width="1"/>
  <text x="200" y="264" text-anchor="middle" font-size="10" font-weight="bold" fill="#842029">Fitxers .s</text>
  <text x="200" y="276" text-anchor="middle" font-size="10" fill="#842029">(Assemblador)</text>

  <!-- AS: 3. Assemblador -->
  <rect x="130" y="300" width="140" height="32" rx="4"
        fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="200" y="320" text-anchor="middle" font-size="11" fill="#6c757d">3. Assemblador (as)</text>

  <!-- O: Fitxers .o -->
  <rect x="145" y="350" width="110" height="32" rx="4"
        fill="#d1e7dd" stroke="#0a3622" stroke-width="1"/>
  <text x="200" y="364" text-anchor="middle" font-size="10" font-weight="bold" fill="#0a3622">Fitxers .o</text>
  <text x="200" y="376" text-anchor="middle" font-size="10" fill="#0a3622">(Objecte)</text>

  <!-- LD: 4. Enllaçador -->
  <rect x="130" y="400" width="140" height="32" rx="4"
        fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="200" y="420" text-anchor="middle" font-size="11" fill="#6c757d">4. Enllaçador (ld)</text>

  <!-- G: Binari Executable -->
  <rect x="145" y="450" width="110" height="32" rx="4"
        fill="#f8d7da" stroke="#842029" stroke-width="2"/>
  <text x="200" y="464" text-anchor="middle" font-size="11" font-weight="bold" fill="#842029">Binari executable</text>

  <!-- ===== FLETXES DEL FLUX PRINCIPAL (verticals) ===== -->

  <!-- CP → I -->
  <line x1="200" y1="132" x2="200" y2="147"
        stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- I → CC -->
  <line x1="200" y1="182" x2="200" y2="197"
        stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- CC → S -->
  <line x1="200" y1="232" x2="200" y2="247"
        stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- S → AS -->
  <line x1="200" y1="282" x2="200" y2="297"
        stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- AS → O -->
  <line x1="200" y1="332" x2="200" y2="347"
        stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- O → LD -->
  <line x1="200" y1="382" x2="200" y2="397"
        stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- LD → G -->
  <line x1="200" y1="432" x2="200" y2="447"
        stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== FLETXES DES DELS SUBGRAPHS → CP ===== -->

  <!-- A (.c, cx=80) → CP (cx=200, y=100): diagonal -->
  <path d="M 80,60 C 80,80 200,80 200,97"
        fill="none" stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- H1 (.h, cx=205) → CP (cx=200, y=100): quasi vertical -->
  <line x1="205" y1="60" x2="202" y2="97"
        stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- H2 (stdio.h, cx=340) → CP (cx=200, y=100): diagonal -->
  <path d="M 340,60 C 340,80 200,80 200,97"
        fill="none" stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ===== FLETXA LIB → LD (corba per la dreta) ===== -->
  <!-- LIB cx=433, y_bot=60 → LD cx=270, y=416 -->
  <path d="M 433,60 C 465,60 465,416 273,416"
        fill="none" stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>

</svg>
