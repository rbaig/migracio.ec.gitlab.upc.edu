     id="desc1">Diagrama que mostra el flux de generació d'un programa executable, des de la implementació amb codi d'alt nivell fins a l'obtenció d'un fitxer executable: Programador → Codi font → Codi expandit → Assemblador → Objecte → Binari executable.</desc>
