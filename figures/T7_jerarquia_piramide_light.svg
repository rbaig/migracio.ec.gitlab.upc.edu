<svg width="580" height="290" viewBox="0 0 580 290" xmlns="http://www.w3.org/2000/svg" role="img">
<title>La jerarquia de memòria (mode clar)</title>
<desc>Diagrama en forma de piràmide de quatre nivells: registres, memòria cau, memòria principal i memòria secundària, amb anotacions de velocitat, cost i capacitat.</desc>

<!-- Nivell 0: Registres (triangle, blau) — costats alineats amb la piràmide -->
<polygon points="290,20 333,72 247,72"
  fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
<text x="290" y="54" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#084298" text-anchor="middle" font-weight="bold">Regs.</text>

<!-- Nivell 1: Memòria cau (verd) -->
<polygon points="243,76 337,76 380,128 200,128"
  fill="#d1e7dd" stroke="#0a3622" stroke-width="1"/>
<text x="290" y="108" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#0a3622" text-anchor="middle" font-weight="bold">Memòria cau</text>

<!-- Nivell 2: Memòria principal (groc) -->
<polygon points="197,132 383,132 427,184 153,184"
  fill="#fff3cd" stroke="#664d03" stroke-width="1"/>
<text x="290" y="164" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#664d03" text-anchor="middle" font-weight="bold">Memòria principal (DRAM)</text>

<!-- Nivell 3: Memòria secundària (vermell) -->
<polygon points="150,188 430,188 473,240 107,240"
  fill="#f8d7da" stroke="#842029" stroke-width="1"/>
<text x="290" y="220" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#842029" text-anchor="middle" font-weight="bold">Memòria secundària (disc / SSD)</text>

<!-- Anotació esquerra: fletxa cap amunt -->
<line x1="90" y1="230" x2="90" y2="50" stroke="#6c757d" stroke-width="1"/>
<polygon points="90,42 86,54 94,54" fill="#6c757d"/>
<text x="78" y="140" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#6c757d" text-anchor="middle" transform="rotate(-90,78,140)">+ velocitat  + cost  − capacitat</text>

<!-- Anotació dreta: fletxa cap avall -->
<line x1="490" y1="50" x2="490" y2="230" stroke="#6c757d" stroke-width="1"/>
<polygon points="490,238 486,226 494,226" fill="#6c757d"/>
<text x="502" y="140" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#6c757d" text-anchor="middle" transform="rotate(90,502,140)">− velocitat  − cost  + capacitat</text>

<!-- Nota inferior -->
<text x="290" y="265" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">els nivells superiors són els més propers a la CPU</text>

</svg>
