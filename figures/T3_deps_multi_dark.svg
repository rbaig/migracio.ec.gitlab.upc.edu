<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="520"
   height="170"
   viewBox="0 0 520 170"
   font-family="'Source Sans Pro', sans-serif"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1,1 9,5 1,9 z" fill="#90bfff"/>
    </marker>
    <marker id="arr-black" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1,1 9,5 1,9 z" fill="#ffffff"/>
    </marker>
  </defs>

  <!-- CAPA 1: TEXT DEL CODI (FreeMono, char_w=7.203) -->
  <text font-family="FreeMono,'Courier New',monospace" font-size="12" fill="#ffffff">
    <tspan x="14" y="22">int multi(int a, int b, int c) {</tspan>
    <tspan x="14" y="40">    int d, e;</tspan>
    <tspan x="14" y="58">    d = a + b;</tspan>
    <tspan x="14" y="92">    e = mcm(c, d);</tspan>
    <tspan x="14" y="126">    return c + d + e;</tspan>
    <tspan x="14" y="144">}</tspan>
  </text>

  <!-- CAPA 2: FRONTERA DE CRIDA -->
  <line x1="14" y1="80" x2="300" y2="80"
        stroke="#adb5bd" stroke-width="1.2" stroke-dasharray="6,4"/>
  <line x1="14" y1="105" x2="500" y2="105"
        stroke="#adb5bd" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="320" y="96" font-size="10" font-style="italic" fill="#adb5bd">codi anterior a la crida</text>
  <text x="320" y="118" font-size="10" font-style="italic" fill="#adb5bd">codi posterior a la crida</text>

  <!-- CAPA 3: FLETXES -->
  <!-- c (blau): signatura (219,18) → return c (97,126). Una sola fletxa que travessa la frontera -->
  <path d="M 211,22 C 150,30 100,70 97,116"
        fill="none" stroke="#90bfff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- d (blau): d=a+b (46,54) → return d (126,126) -->
  <path d="M 55,58 C 90,72 124,90 126,116"
        fill="none" stroke="#90bfff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- e (negre): e=mcm (46,88) → return e (154,126) -->
  <path d="M 56,92 C 110,108 145,112 154,118"
        fill="none" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arr-black)"/>

  <!-- CAPA 4: CERCLES -->
  <circle cx="219" cy="18" r="9" fill="none" stroke="#90bfff" stroke-width="1.5"/>
  <circle cx="46"  cy="54" r="9" fill="none" stroke="#90bfff" stroke-width="1.5"/>
  <circle cx="46"  cy="88" r="9" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="97"  cy="122" r="9" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <circle cx="126" cy="122" r="9" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <circle cx="154" cy="122" r="9" fill="none" stroke="#cc0000" stroke-width="1.5"/>
</svg>
