<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="520"
   height="170"
   viewBox="0 0 520 170"
   font-family="'Liberation Sans', Arial, Helvetica, sans-serif"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1,1 9,5 1,9 z" fill="#90bfff"/>
    </marker>
    <marker id="arr-black" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 1,1 9,5 1,9 z" fill="#ffffff"/>
    </marker>
  </defs>

  <!-- CAPA 1: TEXT (x absolut per a cada tspan, text sense espais duplicats) -->
  <text font-family="'Liberation Mono', 'Courier New', Courier, monospace" font-size="12" fill="#ffffff">
    <tspan x="14.0" y="22">int multi(int a, int b, int c) {</tspan>
    <tspan x="42.8" y="40">int d, e;</tspan>
    <tspan x="42.8" y="58">d = a + b;</tspan>
    <tspan x="42.8" y="92">e = mcm(c, d);</tspan>
    <tspan x="42.8" y="126">return c + d + e;</tspan>
    <tspan x="14.0" y="144">}</tspan>
  </text>

  <!-- CAPA 2: FRONTERA DE CRIDA -->
  <line x1="14" y1="80" x2="300" y2="80"
        stroke="#adb5bd" stroke-width="1.2" stroke-dasharray="6,4"/>
  <line x1="14" y1="105" x2="500" y2="105"
        stroke="#adb5bd" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="320" y="96"  font-size="10" font-style="italic" fill="#adb5bd">codi anterior a la crida</text>
  <text x="320" y="118" font-size="10" font-style="italic" fill="#adb5bd">codi posterior a la crida</text>

  <!-- CAPA 3: FLETXES -->
  <!-- c (blau): signatura → return c -->
  <path d="M 211,22 C 150,30 100,70 97,116"
        fill="none" stroke="#90bfff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- d (blau): d=a+b → return d -->
  <path d="M 46,62 C 80,80 118,95 126,116"
        fill="none" stroke="#90bfff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <!-- e (negre): e=mcm → return e -->
  <path d="M 56,92 C 110,108 145,112 154,118"
        fill="none" stroke="#ffffff" stroke-width="1.5" marker-end="url(#arr-black)"/>

  <!-- CAPA 4: CERCLES -->
  <circle cx="219.3" cy="18.5" r="9" fill="none" stroke="#90bfff" stroke-width="1.5"/>
  <circle cx="46.4"  cy="54.5" r="9" fill="none" stroke="#90bfff" stroke-width="1.5"/>
  <circle cx="46.4"  cy="88.5" r="9" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <circle cx="96.8"  cy="122.5" r="9" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <circle cx="125.6" cy="122.5" r="9" fill="none" stroke="#cc0000" stroke-width="1.5"/>
  <circle cx="154.4" cy="122.5" r="9" fill="none" stroke="#cc0000" stroke-width="1.5"/>
</svg>
