<svg width="680" height="310" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Càlcul de l'adreça de mat[i][j] (mode clar)</title>
<desc>Diagrama que mostra com l'adreça de mat[i][j] es descompon en l'adreça base @mat, un salt de i files senceres (i·NC·T) i un desplaçament de j elements (j·T) dins la fila.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6c757d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Fila 0: gris -->
<rect x="40" y="40" width="560" height="28" rx="3" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0.5"/>
<text x="320" y="58" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">fila 0  (NC elements)</text>

<!-- Fila 1: gris -->
<rect x="40" y="72" width="560" height="28" rx="3" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0.5"/>
<text x="320" y="90" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">fila 1</text>

<!-- Punts suspensius -->
<text x="320" y="118" font-family="'Source Sans Pro', sans-serif" font-size="14" fill="#6c757d" text-anchor="middle">⋮</text>

<!-- Fila i: part j elements (verd clar) -->
<rect x="40" y="128" width="200" height="36" rx="3" fill="#d1e7dd" stroke="#0a3622" stroke-width="0.5"/>
<text x="140" y="150" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#0a3622" text-anchor="middle">j elements</text>

<!-- Element mat[i][j]: groc, destacat -->
<rect x="240" y="124" width="90" height="44" rx="4" fill="#fff3cd" stroke="#664d03" stroke-width="1"/>
<text x="285" y="143" font-family="'Source Sans Pro', sans-serif" font-size="11" font-weight="500" fill="#664d03" text-anchor="middle">mat[i][j]</text>

<!-- Resta de la fila: gris -->
<rect x="330" y="128" width="270" height="36" rx="3" fill="#f8f9fa" stroke="#dee2e6" stroke-width="0.5"/>
<text x="465" y="150" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">···</text>

<!-- Etiqueta fila i -->
<text x="28" y="150" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#6c757d" text-anchor="end">fila i</text>

<!-- Fletxa i·NC·T -->
<line x1="40"  y1="210" x2="40"  y2="196" stroke="#6c757d" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="40"  y1="210" x2="240" y2="210" stroke="#6c757d" stroke-width="0.5"/>
<line x1="240" y1="210" x2="240" y2="196" stroke="#6c757d" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="140" y="228" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#343a40" text-anchor="middle">i · NC · T</text>
<text x="140" y="244" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">(salt de i files)</text>

<!-- Fletxa j·T -->
<line x1="240" y1="262" x2="240" y2="248" stroke="#6c757d" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="240" y1="262" x2="330" y2="262" stroke="#6c757d" stroke-width="0.5"/>
<line x1="330" y1="262" x2="330" y2="248" stroke="#6c757d" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="285" y="280" font-family="'Source Sans Pro', sans-serif" font-size="11" fill="#343a40" text-anchor="middle">j · T</text>

<!-- Etiqueta @mat -->
<text x="40" y="192" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#6c757d" text-anchor="middle">@mat</text>

<!-- Fórmula -->
<text x="420" y="228" font-family="'Source Sans Pro', sans-serif" font-size="12" fill="#343a40" text-anchor="start">@mat[i][j] = @mat + (i·NC + j)·T</text>

</svg>
