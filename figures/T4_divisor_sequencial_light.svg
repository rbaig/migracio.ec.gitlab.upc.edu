<svg width="440" height="450" viewBox="0 0 440 450" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Circuit divisor seqüencial amb restauracio (mode clar)</title>
<desc>Esquema del circuit divisor seqüencial amb algorisme de restauracio: el registre D (2n bits) conte el divisor i es desplaca a la dreta; el registre R (2n bits) conte el dividend/residu; el restador calcula R menys D i, si el resultat es negatiu, restaura sumant D de nou; el registre Q (n bits) acumula els bits del quocient desplacant-se a l'esquerra. El signe de R (bit 2n menys 1) controla el bit del quocient i la restauracio.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6c757d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ============ D (divisor, 2n bits, desplaca dreta) ============ -->
<text x="220" y="40" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#6c757d" text-anchor="middle">desplacament a la dreta (&#247; 2) &#8594;</text>
<rect x="110" y="60" width="220" height="44" rx="3" fill="#cfe2ff" stroke="#084298" stroke-width="1"/>
<text x="220" y="80" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#084298" text-anchor="middle">D</text>
<text x="220" y="96" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#084298" text-anchor="middle">2n bits &#183; divisor</text>

<!-- entrada y -->
<line x1="44" y1="82" x2="108" y2="82" stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>
<text x="38" y="86" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#084298" text-anchor="end">y</text>

<!-- D -> restador -->
<line x1="220" y1="104" x2="220" y2="135" stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ============ Restador ============ -->
<rect x="140" y="135" width="160" height="44" rx="3" fill="#f8f9fa" stroke="#6c757d" stroke-width="1"/>
<text x="220" y="155" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="11" fill="#6c757d" text-anchor="middle">Sumador / restador</text>
<text x="220" y="170" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#6c757d" text-anchor="middle">R &#8722; D   (restaura: R + D)</text>

<!-- restador -> R -->
<line x1="220" y1="179" x2="220" y2="250" stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>

<!-- ============ R (dividend/residu, 2n bits) ============ -->
<rect x="110" y="250" width="220" height="44" rx="3" fill="#d1e7dd" stroke="#0a3622" stroke-width="1"/>
<text x="220" y="270" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#0a3622" text-anchor="middle">R</text>
<text x="220" y="286" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#0a3622" text-anchor="middle">2n bits &#183; dividend/residu (w = R[n&#8722;1:0])</text>

<!-- entrada x -->
<line x1="44" y1="262" x2="108" y2="262" stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>
<text x="38" y="266" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#0a3622" text-anchor="end">x</text>

<!-- realimentacio R -> restador (esquerra) -->
<line x1="110" y1="282" x2="70" y2="282" stroke="#6c757d" stroke-width="1"/>
<line x1="70" y1="282" x2="70" y2="157" stroke="#6c757d" stroke-width="1"/>
<line x1="70" y1="157" x2="140" y2="157" stroke="#6c757d" stroke-width="1" marker-end="url(#arrow)"/>
<text x="78" y="150" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#0a3622" text-anchor="start">R</text>

<!-- ============ Q (quocient, n bits, desplaca esquerra) ============ -->
<rect x="110" y="360" width="160" height="44" rx="3" fill="#fff3cd" stroke="#664d03" stroke-width="1"/>
<text x="190" y="380" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#664d03" text-anchor="middle">Q</text>
<text x="190" y="396" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#664d03" text-anchor="middle">n bits &#183; quocient (z = Q)</text>
<text x="190" y="424" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="10" fill="#6c757d" text-anchor="middle">&#8592; desplacament a l'esquerra (&#215; 2)</text>

<!-- ============ control: signe R[2n-1] ============ -->
<!-- tap des de R cap a la dreta -->
<line x1="330" y1="272" x2="392" y2="272" stroke="#0a3622" stroke-width="1" stroke-dasharray="4,3"/>
<text x="392" y="242" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#0a3622" text-anchor="end">R[2n&#8722;1] (signe)</text>
<!-- branca amunt: restauracio al restador -->
<line x1="392" y1="272" x2="392" y2="168" stroke="#0a3622" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="392" y1="168" x2="304" y2="168" stroke="#0a3622" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
<text x="392" y="132" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#0a3622" text-anchor="end">si R &lt; 0: restaura (R + D)</text>
<!-- branca avall: bit del quocient a Q -->
<line x1="392" y1="272" x2="392" y2="382" stroke="#0a3622" stroke-width="1" stroke-dasharray="4,3"/>
<line x1="392" y1="382" x2="272" y2="382" stroke="#0a3622" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
<text x="392" y="402" font-family="'Liberation Sans', Arial, Helvetica, sans-serif" font-size="9" fill="#0a3622" text-anchor="end">bit Q = 1 si R &#8805; 0</text>

</svg>
