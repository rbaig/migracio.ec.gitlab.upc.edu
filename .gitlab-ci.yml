# Publica la versió HTML del llibre Quarto a GitLab Pages.
# Documentació: https://docs.gitlab.com/ee/user/project/pages/
pages:
  image: ghcr.io/quarto-dev/quarto:latest   # Inclou Quarto CLI + Python; els scripts de pre-render (25_scripts/*.py) només usen la llibreria estàndard de Python (cap `pip install` necessari)
  stage: deploy
  script:
    - quarto render --to html
    - rm -rf public
    - mv _book public     # GitLab Pages exigeix que la sortida es digui `public`
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
